<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Email confirmed · Lineupr</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body class="admin-body">

<div class="confirm-wrap">
  <div class="home-brand confirm-brand">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
      <circle cx="20" cy="20" r="17" stroke="#ffa53e" stroke-width="2.2"/>
      <circle cx="20" cy="20" r="9"  stroke="#ffa53e" stroke-width="1" opacity="0.3"/>
      <circle cx="20" cy="20" r="3.5" fill="#ffa53e"/>
    </svg>
    <span class="home-wordmark">lineup<span class="home-wordmark-r">r</span></span>
  </div>

  <div class="confirm-card">
    <div id="confirmOk">
      <div class="confirm-icon">✓</div>
      <h3>Email confirmed</h3>
      <p class="confirm-text" id="confirmText">Your account is ready.</p>
      <a href="/" class="primary-btn confirm-btn" id="confirmCta">Sign in to Lineupr</a>
    </div>
    <div id="confirmErr" hidden>
      <div class="confirm-icon confirm-icon-err">✕</div>
      <h3>Something's not right</h3>
      <p class="confirm-text" id="confirmErrText"></p>
      <a href="/" class="primary-btn confirm-btn">Go to Lineupr</a>
    </div>
  </div>
</div>

<script type="module">
// If Supabase appended an error (expired/used link), show it instead of the
// success card. Errors arrive in the URL hash, e.g.
// #error=access_denied&error_description=Email+link+is+invalid+or+has+expired
const hash = new URLSearchParams(window.location.hash.slice(1));
if (hash.get("error")) {
  document.getElementById("confirmOk").hidden = true;
  const errBox = document.getElementById("confirmErr");
  errBox.hidden = false;
  document.getElementById("confirmErrText").textContent =
    (hash.get("error_description") || "The confirmation link is invalid or has expired.").replace(/\+/g, " ");
} else {
  // On a successful confirmation Supabase redirects here with session tokens
  // in the hash. Creating the client parses + stores them, which means this
  // device is actually signed in already — reflect that in the CTA. If config
  // isn't reachable the static success message still stands on its own.
  (async () => {
    try {
      const res = await fetch("/api/config");
      const cfg = await res.json();
      if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) return;
      const sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
      const { data } = await sb.auth.getSession();
      if (data && data.session) {
        document.getElementById("confirmText").textContent =
          `You're signed in as ${data.session.user.email}.`;
        document.getElementById("confirmCta").textContent = "Open Lineupr";
      }
    } catch { /* static fallback text is fine */ }
  })();
}
</script>
</body>
</html>
